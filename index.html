<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramazan Mermer Katalog</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f2f2f2; font-family: sans-serif; color: #222; }
  header { background: #2c2c2c; color: #fff; text-align: center; padding: 20px; font-weight: bold; position: sticky; top: 0; z-index: 10; }
  #adminBar { display: none; background: #fff3cd; padding: 10px; text-align: center; font-size: 0.8rem; border-bottom: 1px solid #ffc107; }
  .list { padding: 15px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; }
  .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .card img { width: 100%; aspect-ratio: 9/16; object-fit: cover; background: #eee; display: block; }
  .card-info { padding: 15px; display: flex; align-items: center; justify-content: space-between; }
  .card-name { font-weight: bold; font-size: 1.1rem; }
  .card-price { background: #2c2c2c; color: #fff; padding: 8px 12px; border-radius: 6px; font-weight: bold; }
  .edit-row { display: none; padding: 0 15px 15px; }
  .edit-row.show { display: block; }
  .ebtn { width: 100%; padding: 10px; border: none; border-radius: 6px; background: #eee; cursor: pointer; font-weight: bold; }
  #lockBtn { position: fixed; bottom: 20px; right: 20px; background: #2c2c2c; color: #fff; border: none; border-radius: 50px; padding: 15px 25px; cursor: pointer; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
  #addBtn { display: none; position: fixed; bottom: 20px; left: 20px; background: #2a6e2a; color: #fff; border: none; border-radius: 50px; padding: 15px 25px; cursor: pointer; z-index: 100; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; justify-content: center; }
  .overlay.open { display: flex; }
  .sheet { background: #fff; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 500px; }
  .fg { margin-bottom: 15px; }
  .fg label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #666; }
  .fg input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; outline: none; }
  .sbtns { display: flex; gap: 10px; }
  .sbtn { flex: 1; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
  #passModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 300; align-items: center; justify-content: center; }
  #passModal.open { display: flex; }
  .pbox { background: #fff; padding: 30px; border-radius: 15px; text-align: center; width: 280px; }
</style>
</head>
<body>

<div id="adminBar">YÖNETİCİ MODU AKTİF</div>
<header>RAMAZAN MERMER KATALOG</header>
<div class="list" id="list"></div>

<button id="lockBtn" onclick="toggleAdmin()">🔒 Yönetici</button>
<button id="addBtn" onclick="openAdd()">+ Yeni Model</button>

<div class="overlay" id="editOverlay">
  <div class="sheet">
    <h3 style="margin-bottom:15px">Model Bilgileri</h3>
    <div class="fg"><label>Model Adı</label><input type="text" id="f-name"></div>
    <div class="fg"><label>Fiyat (₺)</label><input type="number" id="f-price"></div>
    <div class="fg"><label>Resim Linki</label><input type="text" id="f-img"></div>
    <div class="sbtns">
      <button class="sbtn" style="background:#eee" onclick="closeEdit()">Vazgeç</button>
      <button class="sbtn" style="background:#2c2c2c; color:#fff" onclick="saveModel()">Kaydet</button>
    </div>
    <p id="delBtn" onclick="deleteModel()" style="color:red; text-align:center; margin-top:15px; cursor:pointer; font-size:0.9rem">Bu Modeli Sil</p>
  </div>
</div>

<div id="passModal">
  <div class="pbox">
    <h3>Şifre Girin</h3>
    <input type="password" id="passIn" style="width:100%; padding:10px; margin:15px 0; text-align:center; font-size:1.5rem">
    <button onclick="checkPass()" style="width:100%; padding:10px; background:#2c2c2c; color:#white; border:none; border-radius:8px; color:white; font-weight:bold">Giriş</button>
    <button onclick="closePass()" style="width:100%; margin-top:10px; background:none; border:none; color:#666">Kapat</button>
  </div>
</div>
