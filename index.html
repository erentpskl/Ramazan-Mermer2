```html
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramazan Mermer</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f2f2f2}

header{
  background:#2c2c2c;
  color:#fff;
  padding:10px;
  text-align:center;
  position:sticky;
  top:0;
}

.header-content{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

header img{height:45px}

.section-title{
  padding:15px;
  font-weight:bold;
  font-size:18px;
}

/* sıralama */
.sort-bar{
  padding:0 15px 10px;
}

.sort-bar select{
  width:100%;
  padding:8px;
  border-radius:8px;
}

/* liste */
.list{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding-bottom:120px;
}

.card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  aspect-ratio:9/16;
  object-fit:cover;
}

.card-info{
  padding:10px;
}

.name-price{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}

.wp-item{
  background:#25D366;
  color:#fff;
  border:none;
  width:100%;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

/* NABIZLI ARAMA BUTONU */
#callBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border:none;
  border-radius:50%;
  cursor:pointer;

  background:#ff3b3b;
  color:#fff;
  font-size:26px;

  box-shadow:0 0 0 rgba(255,59,59,0.7);
  animation:pulse 1.5s infinite;

  display:flex;
  align-items:center;
  justify-content:center;
}

#callBtn img{
  width:30px;
}

/* nabız animasyonu */
@keyframes pulse{
  0%{
    box-shadow:0 0 0 0 rgba(255,59,59,0.7);
  }
  70%{
    box-shadow:0 0 0 20px rgba(255,59,59,0);
  }
  100%{
    box-shadow:0 0 0 0 rgba(255,59,59,0);
  }
}

/* viewer */
#viewer{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

#viewer img{
  max-width:95%;
  max-height:95%;
}
</style>
</head>

<body>

<header>
  <div class="header-content">
    <img src="logo.png">
    <h2>Ramazan Mermer</h2>
  </div>
</header>

<div class="section-title">Mezar Modellerimiz:</div>

<div class="sort-bar">
<select id="sortSelect">
  <option value="default">Sıralama</option>
  <option value="asc">Ucuzdan pahalıya</option>
  <option value="desc">Pahalıdan ucuza</option>
</select>
</div>

<div class="list" id="list"></div>

<!-- NABIZLI ARAMA -->
<button id="callBtn" onclick="callPhone()">
  <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png">
</button>

<!-- viewer -->
<div id="viewer" onclick="closeViewer()">
  <img id="viewerImg">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyD6TKF0EJbmJtl9jVNKS-Lz24weFjYKGeE",
authDomain:"ramazan-mermer.firebaseapp.com",
databaseURL:"https://ramazan-mermer-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"ramazan-mermer"
});

const db=getDatabase(app);
const list=document.getElementById("list");
const sortSelect=document.getElementById("sortSelect");

let modelsData=[];

/* veri çek */
onValue(ref(db,"models"),snap=>{
const data=snap.val();
if(!data) return;

modelsData = Object.entries(data).map(([id,item])=>({
  id,
  ...item
}));

render();
});

/* render */
function render(){
list.innerHTML="";

let sorted=[...modelsData];

if(sortSelect.value==="asc"){
sorted.sort((a,b)=>a.price-b.price);
}
if(sortSelect.value==="desc"){
sorted.sort((a,b)=>b.price-a.price);
}

sorted.forEach(item=>{
const link = window.location.href + "#model-" + item.id;

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="${item.img}" onclick="openViewer('${item.img}')">

<div class="card-info">
  <div class="name-price">
    <div>${item.name}</div>
    <div>${item.price}₺</div>
  </div>

  <button class="wp-item" onclick="sendWhatsApp(event,'${item.name}','${link}')">
    WhatsApp'tan sor
  </button>
</div>
`;

list.appendChild(div);
});
}

/* sıralama */
sortSelect.addEventListener("change",render);

/* foto */
window.openViewer=(src)=>{
document.getElementById("viewer").style.display="flex";
document.getElementById("viewerImg").src=src;
};

window.closeViewer=()=>{
document.getElementById("viewer").style.display="none";
};

/* whatsapp */
window.sendWhatsApp=(e,name,link)=>{
e.stopPropagation();
const msg = `Merhaba, ${name} modeli hakkında bilgi almak istiyorum.\nÜrün linki: ${link}`;
window.open("https://wa.me/905423189711?text="+encodeURIComponent(msg),"_blank");
};

/* telefon */
window.callPhone=()=>{
window.location.href="tel:+905423189711";
};
</script>

</body>
</html>
```
