<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramazan Mermer</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f2f2f2}

/* HEADER */
header{
  background:#2c2c2c;
  color:#fff;
  padding:12px;
  text-align:center;
  position:sticky;
  top:0;
  cursor:pointer;
}

.header-content{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.logo{height:45px}

.section-title{
  padding:15px;
  font-weight:bold;
  font-size:18px;
}

/* sıralama */
.sort-bar{
  padding:0 15px 10px;
}

.sort-bar select{
  width:100%;
  padding:8px;
  border-radius:8px;
}

/* liste */
.list{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding-bottom:120px;
}

.card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  aspect-ratio:9/16;
  object-fit:cover;
}

.card-info{padding:10px}

.name-price{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}

.wp-item{
  background:#25D366;
  color:#fff;
  border:none;
  width:100%;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.admin-actions{
  display:flex;
  gap:5px;
  margin-top:5px;
}

.admin-actions button{
  flex:1;
  padding:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.editBtn{background:#ffc107}
.deleteBtn{background:#dc3545;color:#fff}

/* NABIZ */
#callBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  background:#ff3b3b;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 0 rgba(255,59,59,0.6);
  animation:pulse 1.8s infinite;
}

#callBtn img{width:28px}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,59,59,0.6);}
  70%{box-shadow:0 0 0 15px rgba(255,59,59,0);}
  100%{box-shadow:0 0 0 0 rgba(255,59,59,0);}
}

/* viewer */
#viewer{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

#viewer img{
  max-width:95%;
  max-height:95%;
}

/* ADMIN PANEL */
#adminPanel{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.admin-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:300px;
}

.admin-box input{
  width:100%;
  margin:5px 0;
  padding:8px;
}

.admin-box button{
  width:100%;
  padding:8px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

</style>
</head>

<body>

<header onclick="secretClick()">
  <div class="header-content">
    <img src="logo.png" class="logo">
    <h2>Ramazan Mermer</h2>
  </div>
</header>

<div class="section-title">Mezar Modellerimiz:</div>

<div class="sort-bar">
<select id="sortSelect">
  <option value="default">Sıralama</option>
  <option value="asc">Artan</option>
  <option value="desc">Azalan</option>
</select>
</div>

<div class="list" id="list"></div>

<button id="callBtn" onclick="callPhone()">
  📞
</button>

<div id="viewer" onclick="closeViewer()">
  <img id="viewerImg">
</div>

<div id="adminPanel">
  <div class="admin-box">
    <h3>Admin</h3>
    <input type="password" id="pass" placeholder="Şifre">
    <button onclick="login()">Giriş</button>

    <div id="adminArea" style="display:none;">
      <h4 id="formTitle">Ürün Ekle</h4>
      <input id="name" placeholder="Model adı">
      <input id="price" placeholder="Fiyat">
      <input id="img" placeholder="Resim URL">
      <button onclick="saveProduct()">Kaydet</button>
      <button onclick="resetForm()">Temizle</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, push, set, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"ramazan-mermer.firebaseapp.com",
databaseURL:"https://ramazan-mermer-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"ramazan-mermer"
});

const db=getDatabase(app);
const list=document.getElementById("list");
const sortSelect=document.getElementById("sortSelect");

let modelsData=[];
let editId=null;
let isAdmin=false;

/* VERİ */
onValue(ref(db,"models"),snap=>{
const data=snap.val();
if(!data) return;

modelsData = Object.entries(data).map(([id,item])=>({id,...item}));
render();
});

/* RENDER */
function render(){
list.innerHTML="";
let sorted=[...modelsData];

if(sortSelect.value==="asc") sorted.sort((a,b)=>a.price-b.price);
if(sortSelect.value==="desc") sorted.sort((a,b)=>b.price-a.price);

sorted.forEach(item=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="${item.img}" onclick="openViewer('${item.img}')">
<div class="card-info">
  <div class="name-price">
    <div>${item.name}</div>
    <div>${item.price}₺</div>
  </div>

  <button class="wp-item" onclick="sendWhatsApp(event,'${item.name}')">
    WhatsApp
  </button>

  ${isAdmin ? `
  <div class="admin-actions">
    <button class="editBtn" onclick="editProduct('${item.id}')">Düzenle</button>
    <button class="deleteBtn" onclick="deleteProduct('${item.id}')">Sil</button>
  </div>` : ``}
</div>
`;

list.appendChild(div);
});
}

sortSelect.addEventListener("change",render);

/* ADMIN */
window.login=()=>{
if(document.getElementById("pass").value==="1234"){
document.getElementById("adminArea").style.display="block";
isAdmin=true;
render();
}
};

/* EKLE / GÜNCELLE */
window.saveProduct=()=>{
const name=nameInput.value;
const price=parseInt(priceInput.value);
const img=imgInput.value;

if(editId){
update(ref(db,"models/"+editId),{name,price,img});
alert("Güncellendi");
}else{
set(push(ref(db,"models")),{name,price,img});
alert("Eklendi");
}

resetForm();
};

/* FORM RESET */
window.resetForm=()=>{
editId=null;
nameInput.value="";
priceInput.value="";
imgInput.value="";
document.getElementById("formTitle").innerText="Ürün Ekle";
};

/* DÜZENLE */
window.editProduct=(id)=>{
const item=modelsData.find(i=>i.id===id);

editId=id;
nameInput.value=item.name;
priceInput.value=item.price;
imgInput.value=item.img;

document.getElementById("formTitle").innerText="Ürünü Güncelle";
};

/* SİL */
window.deleteProduct=(id)=>{
if(confirm("Silmek istiyor musun?")){
remove(ref(db,"models/"+id));
}
};

/* DİĞER */
window.openViewer=(src)=>{
viewer.style.display="flex";
viewerImg.src=src;
};

window.closeViewer=()=>viewer.style.display="none";

window.sendWhatsApp=(e,name)=>{
e.stopPropagation();
window.open("https://wa.me/905423189711?text="+name,"_blank");
};

window.callPhone=()=>window.location.href="tel:+905423189711";

/* GİZLİ */
let c=0,t;
window.secretClick=()=>{
c++;
clearTimeout(t);
t=setTimeout(()=>c=0,1500);
if(c===5) adminPanel.style.display="flex";
};
</script>

</body>
</html>
